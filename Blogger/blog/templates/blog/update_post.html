{% extends 'blog/base.html' %}

{% load static %}

{% block title %}Update Post{% endblock %}

{% block content %}

<h2 style="margin-bottom:20px;">Update {{ post.title }}</h2>

<div class="form-container">
    <form method="POST" enctype="multipart/form-data" action="{ url 'blog:update_post_view' post_id=post.id }" encoding="multipart/form-data">
        {% csrf_token %}

        <input type="text" name="title" placeholder="Post Title" required>
        <textarea name="content" rows="6" placeholder="Post Content" required></textarea>
        <input type="file" name="image" class="form-control">

    </form>
</div>

{% endblock %}
