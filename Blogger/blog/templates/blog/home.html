{% extends 'blog/base.html' %}

{% load static %}

{% block content %}

<h2 style="margin-bottom:20px;">Latest Posts</h2>

{% for post in posts %}
    <div class="post-card">

        {% if post.image %}
            <img src="{{ post.image.url }}" alt="{{ post.title }}">
        {% endif %}

        <h3>{{ post.title }}</h3>
        <p>{{ post.content }}</p>
        <small>{{ post.published_at }}</small>
    </div>
{% endfor %}

{% endblock %}
